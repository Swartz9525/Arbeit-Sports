version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/arbeit-sports
      - JWT_SECRET=supersecretjwtsecretkeychangeinproduction
      - JWT_REFRESH_SECRET=supersecretrefreshjwtsecretkeychangeinproduction
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
